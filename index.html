<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F4EEDF">
<title>forgetful · spaced repetition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EEDF;
    --paper: #FAF6EC;
    --ink: #1F1B17;
    --ink-soft: #5C544B;
    --ink-faint: #8A8175;
    --line: #E2D9C5;
    --line-strong: #D6CAB0;
    --accent: #B85A2E;
    --accent-soft: #E5C9B2;
    --shadow: 0 1px 0 rgba(31,27,23,0.04), 0 8px 24px -14px rgba(31,27,23,0.18);
    --shadow-sm: 0 1px 0 rgba(31,27,23,0.04), 0 4px 12px -8px rgba(31,27,23,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,252,240,0.7) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(184,90,46,0.05) 0%, transparent 60%);
    background-attachment: fixed;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 18px;
    text-wrap: pretty;
  }

  h1, h2, h3, .balance { text-wrap: balance; }

  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Header */
  header {
    text-align: center;
    padding-top: 4px;
    position: relative;
  }
  .brand {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1;
  }
  .brand .dot { color: var(--accent); }
  .tagline {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }
  .gear-btn {
    position: absolute;
    top: 4px;
    right: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    color: var(--ink-faint);
    font-size: 24px;
    line-height: 1;
    transition: color .15s ease, background .15s ease;
  }
  .gear-btn:hover { color: var(--ink-soft); background: var(--line); }

  /* Anchor card (Day 1) */
  .anchor {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 20px 22px 22px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .anchor:hover { border-color: var(--line-strong); }
  .anchor:active { transform: scale(0.992); }

  .anchor-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .day-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .day-tag .pip {
    width: 5px; height: 5px; border-radius: 99px;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .edit-hint {
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .full-date {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 34px;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--ink);
    display: block;
  }
  .weekday {
    font-family: 'Inter', system-ui, sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
    letter-spacing: -0.01em;
    display: block;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
    margin-top: 16px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .divider-text {
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Interval grid */
  .intervals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
  }

  /* Forgetting curve tiles */
  .curve-card {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 10px 12px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    opacity: 0.82;
  }
  .curve-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .curve-date {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .curve-weekday {
    font-family: 'Inter', system-ui, sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 5px;
    line-height: 1;
  }

  /* Increment cards */
  .card {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 10px 12px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }

  .day-num-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
    margin-bottom: 10px;
  }
  .day-num-prefix {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--accent);
  }
  .day-num-suffix {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .day-num {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--accent);
    line-height: 1;
    padding: 2px 4px;
    min-width: 16px;
    display: inline-block;
    text-transform: uppercase;
  }

  .card-date {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .card-weekday {
    font-family: 'Inter', system-ui, sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 5px;
    line-height: 1;
  }

  /* Footer */
  footer {
    text-align: right;
    padding-top: 32px;
    padding-bottom: 16px;
  }
  .footer-text {
    font-size: 10.5px;
    color: var(--ink-faint);
    line-height: 1.5;
    letter-spacing: 0.02em;
    font-style: italic;
  }

  /* Hidden native date input */
  .hidden-input {
    position: absolute;
    left: 16px;
    bottom: 12px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: none;
    background: transparent;
  }

  /* Sidebar overlay */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31,27,23,0.25);
    z-index: 100;
    backdrop-filter: blur(1px);
  }
  .sidebar-overlay.open { display: block; }

  /* Sidebar panel */
  .sidebar {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 280px;
    background: var(--paper);
    border-left: 1px solid var(--line);
    box-shadow: -8px 0 32px -8px rgba(31,27,23,0.14);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 28px 22px 32px;
    gap: 24px;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .sidebar-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink-faint);
    padding: 4px;
    border-radius: 6px;
    transition: color .15s, background .15s;
    line-height: 1;
  }
  .sidebar-close:hover { color: var(--ink); background: var(--line); }

  .sidebar-tiles {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-tile {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    text-align: left;
  }
  .sidebar-tile-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .sidebar-tile-day {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .sidebar-tile-day span { color: var(--ink-soft); font-size: 16px; font-weight: 500; }
  .sidebar-input {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--line-strong);
    outline: none;
    width: 72px;
    text-align: center;
    padding: 0;
    -moz-appearance: textfield;
    transition: border-color .15s;
  }
  .sidebar-input:focus { border-color: var(--accent); }
  .sidebar-input::-webkit-outer-spin-button,
  .sidebar-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .sidebar-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
  }
  .btn-save {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-save:hover { opacity: 0.88; }
  .btn-reset {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid var(--line-strong);
    background: transparent;
    color: var(--ink-soft);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-reset:hover { border-color: var(--ink-soft); color: var(--ink); }

  /* Entrance animation */
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  header   { animation: rise .45s ease .00s both; }
  .anchor  { animation: rise .55s ease .08s both; }
  .divider { animation: rise .45s ease .18s both; }
  .divider.divider-increments { animation: rise .45s ease .44s both; }
  .intervals .card:nth-child(1) { animation: rise .55s ease .50s both; }
  .intervals .card:nth-child(2) { animation: rise .55s ease .57s both; }
  .intervals .card:nth-child(3) { animation: rise .55s ease .64s both; }
  .curve-grid .curve-card:nth-child(1) { animation: rise .55s ease .22s both; }
  .curve-grid .curve-card:nth-child(2) { animation: rise .55s ease .29s both; }
  .curve-grid .curve-card:nth-child(3) { animation: rise .55s ease .36s both; }
  footer   { animation: rise .45s ease .70s both; }

  /* Update pulse */
  @keyframes pulse-text {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.05); color: var(--accent); }
    100% { transform: scale(1); }
  }
  .pulse { animation: pulse-text .42s ease; display: inline-block; transform-origin: center; }

  /* Tiny screens */
  @media (max-height: 640px) {
    body { padding: 14px; }
    .app { gap: 14px; }
    .anchor { padding: 16px 18px 18px; }
    .brand { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar" aria-label="Customize intervals">
  <div class="sidebar-header">
    <span class="sidebar-title">Intervals</span>
    <button class="sidebar-close" id="sidebar-close" aria-label="Close">✕</button>
  </div>
  <div class="sidebar-tiles">
    <div class="sidebar-tile">
      <div class="sidebar-tile-label">1st Interval</div>
      <div class="sidebar-tile-day"><span>Day</span><input class="sidebar-input" type="number" min="1" max="999" inputmode="numeric" data-si="0" value="2"></div>
    </div>
    <div class="sidebar-tile">
      <div class="sidebar-tile-label">2nd Interval</div>
      <div class="sidebar-tile-day"><span>Day</span><input class="sidebar-input" type="number" min="1" max="999" inputmode="numeric" data-si="1" value="7"></div>
    </div>
    <div class="sidebar-tile">
      <div class="sidebar-tile-label">3rd Interval</div>
      <div class="sidebar-tile-day"><span>Day</span><input class="sidebar-input" type="number" min="1" max="999" inputmode="numeric" data-si="2" value="30"></div>
    </div>
  </div>
  <div class="sidebar-actions">
    <button class="btn-save" id="btn-save">Save</button>
    <button class="btn-reset" id="btn-reset">Reset</button>
  </div>
</aside>

<main class="app" role="application" aria-label="forgetful · spaced repetition">

  <header>
    <h1 class="brand">forgetful<span class="dot">.</span></h1>
    <div class="tagline">spaced repetition</div>
    <button class="gear-btn" id="gear-btn" aria-label="Customize intervals">⚙</button>
  </header>

  <section class="anchor" id="anchor" aria-label="Anchor date">
    <div class="anchor-row">
      <span class="day-tag"><span class="pip"></span>Day 1 · today</span>
      <span class="edit-hint">tap to change ↗</span>
    </div>
    <div>
      <span class="full-date balance" id="anchor-fulldate">May 14, 2026</span>
      <span class="weekday" id="anchor-weekday">Thursday</span>
    </div>
    <input type="date" class="hidden-input" id="date-picker" aria-label="Choose anchor date">
  </section>

  <div class="divider" role="separator" aria-label="Forgetting Curve">
    <div class="divider-line"></div>
    <div class="divider-text">Forgetting Curve</div>
    <div class="divider-line"></div>
  </div>

  <section class="intervals curve-grid" aria-label="Forgetting curve intervals">
    <article class="curve-card">
      <div class="curve-label" data-curve-label="0">DAY 2</div>
      <div class="curve-date" data-curve-date="0">—</div>
      <div class="curve-weekday" data-curve-weekday="0">—</div>
    </article>
    <article class="curve-card">
      <div class="curve-label" data-curve-label="1">DAY 7</div>
      <div class="curve-date" data-curve-date="1">—</div>
      <div class="curve-weekday" data-curve-weekday="1">—</div>
    </article>
    <article class="curve-card">
      <div class="curve-label" data-curve-label="2">DAY 30</div>
      <div class="curve-date" data-curve-date="2">—</div>
      <div class="curve-weekday" data-curve-weekday="2">—</div>
    </article>
  </section>

  <div class="divider divider-increments" role="separator" aria-label="Increments">
    <div class="divider-line"></div>
    <div class="divider-text">Increments</div>
    <div class="divider-line"></div>
  </div>

  <section class="intervals" aria-label="Reminder intervals">
    <article class="card" data-index="0">
      <div class="day-num-row">
        <span class="day-num-prefix">+</span>
        <span class="day-num" data-day-num>1</span>
        <span class="day-num-suffix" data-day-suffix>DAY</span>
      </div>
      <div class="card-date" data-date>—</div>
      <div class="card-weekday" data-weekday>—</div>
    </article>
    <article class="card" data-index="1">
      <div class="day-num-row">
        <span class="day-num-prefix">+</span>
        <span class="day-num" data-day-num>5</span>
        <span class="day-num-suffix" data-day-suffix>DAYS</span>
      </div>
      <div class="card-date" data-date>—</div>
      <div class="card-weekday" data-weekday>—</div>
    </article>
    <article class="card" data-index="2">
      <div class="day-num-row">
        <span class="day-num-prefix">+</span>
        <span class="day-num" data-day-num>23</span>
        <span class="day-num-suffix" data-day-suffix>DAYS</span>
      </div>
      <div class="card-date" data-date>—</div>
      <div class="card-weekday" data-weekday>—</div>
    </article>
  </section>

  <footer>
    <p class="footer-text"><span style="color:var(--accent)">♥</span> by chuawt</p>
  </footer>

</main>

<script>
  const DEFAULT_CURVE = [2, 7, 30];

  let anchorDate = startOfDay(new Date());
  let curveIntervals = [...DEFAULT_CURVE];

  const weekdays      = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const weekdaysShort = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months        = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthsShort   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0,0,0,0);
    return x;
  }
  function addDays(date, days) {
    const r = new Date(date);
    r.setDate(r.getDate() + days);
    return r;
  }
  function ymd(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth() === b.getMonth() &&
           a.getDate() === b.getDate();
  }
  function diffDays(a, b) {
    return Math.round((b - a) / 86400000);
  }

  function render() {
    // Anchor
    document.getElementById('anchor-weekday').textContent = weekdays[anchorDate.getDay()];
    document.getElementById('anchor-fulldate').textContent =
      `${months[anchorDate.getMonth()]} ${anchorDate.getDate()}, ${anchorDate.getFullYear()}`;
    document.getElementById('date-picker').value = ymd(anchorDate);

    const tag = document.querySelector('.day-tag');
    const isToday = isSameDay(anchorDate, startOfDay(new Date()));
    tag.innerHTML = `<span class="pip"></span>Day 1 · ${isToday ? 'today' : 'anchor'}`;

    // Forgetting curve: anchor is Day 1, so DAY n = anchor + (n-1) days
    curveIntervals.forEach((n, i) => {
      const target = addDays(anchorDate, n - 1);
      document.querySelector(`[data-curve-label="${i}"]`).textContent = `DAY ${n}`;
      document.querySelector(`[data-curve-date="${i}"]`).textContent =
        `${monthsShort[target.getMonth()]} ${target.getDate()}`;
      document.querySelector(`[data-curve-weekday="${i}"]`).textContent =
        weekdaysShort[target.getDay()];
    });

    // Increments: days between consecutive curve dates
    const gaps = [
      curveIntervals[0] - 1,
      curveIntervals[1] - curveIntervals[0],
      curveIntervals[2] - curveIntervals[1],
    ];

    document.querySelectorAll('.card').forEach((card, i) => {
      const gap = gaps[i];
      const target = addDays(anchorDate, gaps[i]);
      card.querySelector('[data-day-num]').textContent = gap;
      card.querySelector('[data-day-suffix]').textContent = gap === 1 ? 'DAY' : 'DAYS';
      card.querySelector('[data-date]').textContent =
        `${monthsShort[target.getMonth()]} ${target.getDate()}`;
      card.querySelector('[data-weekday]').textContent = weekdaysShort[target.getDay()];
    });
  }

  function pulse(el) {
    if (!el) return;
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  // --- Anchor date picker ---
  const anchorEl  = document.getElementById('anchor');
  const datePicker = document.getElementById('date-picker');

  function openDatePicker() {
    if (typeof datePicker.showPicker === 'function') {
      try { datePicker.showPicker(); return; } catch (_) {}
    }
    datePicker.focus();
    datePicker.click();
  }
  anchorEl.addEventListener('click', openDatePicker);
  anchorEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDatePicker(); }
  });
  anchorEl.setAttribute('role', 'button');
  anchorEl.setAttribute('tabindex', '0');

  datePicker.addEventListener('change', (e) => {
    const v = e.target.value;
    if (!v) return;
    const [y, m, d] = v.split('-').map(Number);
    anchorDate = startOfDay(new Date(y, m - 1, d));
    render();
    pulse(document.getElementById('anchor-fulldate'));
  });

  // --- Sidebar ---
  const sidebar        = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const gearBtn        = document.getElementById('gear-btn');
  const closeBtn       = document.getElementById('sidebar-close');
  const siInputs       = document.querySelectorAll('.sidebar-input');

  function openSidebar() {
    curveIntervals.forEach((v, i) => { siInputs[i].value = v; });
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  gearBtn.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  document.getElementById('btn-save').addEventListener('click', () => {
    const vals = Array.from(siInputs).map(inp => parseInt(inp.value, 10));
    if (vals.some(v => !isFinite(v) || v < 1 || v > 999)) return;
    if (vals[1] <= vals[0] || vals[2] <= vals[1]) {
      siInputs[0].style.borderColor = vals[1] <= vals[0] ? 'red' : '';
      siInputs[1].style.borderColor = vals[2] <= vals[1] ? 'red' : '';
      return;
    }
    siInputs.forEach(inp => inp.style.borderColor = '');
    curveIntervals = vals;
    render();
    closeSidebar();
    pulse(document.querySelector('[data-curve-date="0"]'));
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    curveIntervals = [...DEFAULT_CURVE];
    curveIntervals.forEach((v, i) => { siInputs[i].value = v; });
    siInputs.forEach(inp => inp.style.borderColor = '');
    render();
  });

  render();
</script>
</body>
</html>
